# Full nginx config for the all-in-one production image.
# php-fpm runs in the same container, so fastcgi_pass targets localhost.

user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    server {
        listen 80;
        server_name _;
        root /var/www/html/public;
        index index.php index.html;

        # Laravel front-controller
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP via FPM (same container, localhost)
        location ~ \.php$ {
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include       fastcgi_params;
        }

        # Long-lived cache for static assets
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|otf|webp)$ {
            expires max;
            log_not_found off;
        }

        error_log  /dev/stderr;
        access_log /dev/stdout;
    }
}

